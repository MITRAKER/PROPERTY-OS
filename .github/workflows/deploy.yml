name: Deploy to Cloudflare

# Every push to the app branches rebuilds and redeploys the live Worker, so the
# site at property-os-morning-briefing.property-os.workers.dev always matches the
# repo. Unit tests run first — a red build never reaches production.
on:
  push:
    branches: [Frontend, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm run test:unit

      - name: Build
        working-directory: web
        env:
          # Identifiers, not secrets — they only work with the API token below.
          D1_DATABASE_NAME: property-os
          D1_DATABASE_ID: 901202b9-97ff-48dc-8c24-f5cfdbf326fb
        run: npm run build

      # Deploys with the repo's pinned wrangler. The build wrote
      # web/.wrangler/deploy/config.json, so this resolves the built Worker.
      - name: Deploy to Cloudflare Workers
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
